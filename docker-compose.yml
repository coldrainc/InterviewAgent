services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-agent-postgres
    environment:
      POSTGRES_DB: interview_agent
      POSTGRES_USER: interview_agent
      POSTGRES_PASSWORD: interview_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_agent -d interview_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: interview-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: interview-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: interview_agent
      MINIO_ROOT_PASSWORD: interview_agent_password
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  qdrant_storage:
  minio_data:
